	<link href="sivo/css/visualEffects/effects.css" rel="stylesheet" type="text/css">
	<link href="sivo/css/visualEffects/lines.css" rel="stylesheet" type="text/css">

<body style="background-image: url('pictures/backgrounds/tech.png');">
	<header class="sivoStaticHeader" id="navbar">
		<div class="sivoHeaderContainer">
			<a href="index.html" class="sivoHeaderLogo"><img class="sivoHeaderLogo" src="pictures/logos/logo.png" alt="company logo"></a>
			<a href="javascript:void(0);" class="sivoHeaderMenuButton" onclick="showStaticMenu()">≡</a>
		</div>
	</header>
	<nav class="sivoStaticHeaderMenuContainer" id="sivoLinks">
	</nav>
	<main>
		<div class="section">
			<div class="simitrut-leftLine"></div>
			<article class="simitrut-mainArticle">
				<h2 class="simitrut-title"><b>Ardo v0.4</b></h2>
			</article>
		</div>
		<section>
			<h1 class="whatIdoHeader" id="what_i_do_id">Bedroom</h1>
			<div class="container">
				<div class="jobButton">
					<div class="jobButtonText" id="temp">0.0 °C</div>
				</div>
                <div class="jobButton"">
					<div class="jobButtonText" id="humi">0.0 pH</div>
				</div>
			</div>
		</section>
        <script>
            async function fetchData()
            {
                const res = await fetch("/data");
                const data = await res.json();

                document.getElementById("temp").innerText = data.a;
                document.getElementById("humi").innerText = data.b;
            }
            setInterval(fetchData, 2000);
            fetchData();
        </script>
		<div class="section" id="contact">
			<article class="simitrut-contactArticle">
				<h2 class="simitrut-contactTitle">Social</h2>
				<div class="simitrut-paragraph">
					<table>
						<tr>
							<th>GitHub:</th>
							<td><a href="https://github.com/Riyufuchi">https://github.com/Riyufuchi</a></td>
						</tr>
						<tr>
							<th>Ko-Fi:</th>
							<td><a href="https://ko-fi.com/riyufuchi">https://ko-fi.com/riyufuchi</a></td>
						</tr>
					</table>
				</div>
			</article>
			<div class="simitrut-rightHorizontalLine"></div>
			<div class="simitrut-rightVerticalLine"></div>
		</div>
	</main>
	<footer id="footer">
		<!-- links are added via javascript -->
	</footer>
</body>
